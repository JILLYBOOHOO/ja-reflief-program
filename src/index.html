<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>JaRelief</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Manrope:wght@400;700;800&family=Work+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <!-- Material Symbols -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries" defer></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "jamaica-green": "#009b3a",
            "jamaica-gold": "#fed100",
            "jamaica-black": "#000000",
            "primary": "#009b3a",
            "on-primary": "#ffffff",
            "secondary": "#fed100",
            "surface": "#f8f9f8",
            "on-surface": "#1a1c1a",
            "surface-container": "#f0f4f0",
            "surface-container-high": "#e8eee8",
            "outline": "#727972",
            "on-tertiary-container": "#fcfcfc",
            "inverse-primary": "#62df74",
            "on-primary-container": "#f7fff2",
            "on-tertiary-fixed": "#1b1b1b",
            "secondary-fixed": "#ffe17b",
            "surface-tint": "#006e27",
            "on-secondary-fixed-variant": "#554500",
            "on-error": "#ffffff",
            "inverse-surface": "#2e3130",
            "on-tertiary-fixed-variant": "#474747",
            "surface-container-lowest": "#ffffff",
            "primary-fixed": "#7ffc8d",
            "on-surface-variant": "#3e4a3c",
            "surface-variant": "#e1e3e1",
            "on-error-container": "#93000a",
            "tertiary-fixed": "#e2e2e2",
            "primary-fixed-dim": "#62df74",
            "outline-variant": "#bdcab9",
            "on-secondary": "#ffffff",
            "background": "#f8faf8",
            "surface-bright": "#f8faf8",
            "tertiary": "#5c5c5c",
            "on-secondary-fixed": "#231b00",
            "surface-container-highest": "#e1e3e1",
            "tertiary-container": "#747474",
            "on-primary-fixed": "#002107",
            "secondary-fixed-dim": "#ecc300",
            "primary-container": "#008731",
            "on-background": "#191c1b",
            "on-secondary-container": "#705b00",
            "error": "#ba1a1a",
            "surface-container-low": "#f2f4f2",
            "on-tertiary": "#ffffff",
            "secondary-container": "#ffd31a",
            "inverse-on-surface": "#eff1ef",
            "error-container": "#ffdad6",
            "surface-dim": "#d8dad9",
            "on-primary-fixed-variant": "#00531b",
            "tertiary-fixed-dim": "#c6c6c6"
          },
          fontFamily: {
            "headline": ["Plus Jakarta Sans", "Manrope"],
            "body": ["Plus Jakarta Sans", "Work Sans"],
            "label": ["Plus Jakarta Sans", "Work Sans"]
          },
          borderRadius: { "DEFAULT": "0.75rem", "lg": "1.5rem", "xl": "2rem", "full": "9999px" },
        },
      },
    }
  </script>
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#1976d2">
  <!-- Late Loading SDKs (Moved to specific feature modules) -->

  <!-- Inline theme script to prevent light mode flash -->
  <script>
    (function () {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'dark') {
        document.body.classList.add('dark-theme');
      }
    })();
  </script>
  <meta name="description" content="JA RELIEF - Official Jamaican Disaster Response and Aid Platform. Request assistance, donate items, and find emergency services near you.">
  <style>
    /* CRITICAL INITIAL SPLASH STYLES */
    .initial-loader {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #f8faf8;
      background-image: linear-gradient(135deg, #f8faf8, #e8eee8);
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      color: #1a1c1a;
      z-index: 99999;
      transition: opacity 0.5s ease;
    }
    .spinner {
      width: 60px;
      height: 60px;
      border: 6px solid #009b3a;
      border-bottom-color: transparent;
      border-radius: 50%;
      display: inline-block;
      box-sizing: border-box;
      animation: rotation 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
    }
    @keyframes rotation {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .loading-text {
      margin-top: 24px;
      font-weight: 800;
      font-size: 1.5rem;
      letter-spacing: -0.03em;
      text-transform: uppercase;
      background: linear-gradient(90deg, #009b3a, #000);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .loading-subtext {
      margin-top: 10px;
      color: #727972;
      font-size: 0.95rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    
    /* CRITICAL HEADER & BANNER STYLES */
    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.5rem 1rem;
      color: white;
      background: linear-gradient(135deg, #009b3a, #000 30%, #000 70%, #fed100);
      width: 100%;
      box-shadow: 0 6px 0px rgba(0, 0, 0, 1);
      z-index: 100;
      border-bottom: 2px solid rgba(255, 255, 255, 0.1);
    }
    .header h1 {
      margin: 1rem 0;
      font-size: 2.8rem;
      text-align: center;
      color: white;
      text-shadow: 3px 3px 0px rgba(0, 0, 0, 1);
      font-family: Georgia, serif;
      font-weight: 900;
      letter-spacing: -0.05em;
    }
    .critical-banner {
      background: #ba1a1a;
      color: white;
      padding: 0.5rem 1.5rem;
      text-align: center;
      font-weight: 800;
      border-bottom: 4px solid #000;
      z-index: 1000;
    }
  </style>
</head>

<body>
  <app-root>
    <div class="initial-loader">
      <span class="spinner"></span>
      <p class="loading-text">JA RELIEF is powering up</p>
      <p class="loading-subtext">Connecting you to emergency resources...</p>
    </div>
  </app-root>
  <noscript>Please enable JavaScript to continue using this application.</noscript>
</body>

</html>
