<header class="header">
    <h1>Welcome to JA RELIEF</h1>

    <nav role="navigation" aria-label="Main Navigation" class="flex flex-wrap items-center gap-3">
        <a routerLink="/" aria-label="Go to Home Page" class="nav-home">
            <span class="icon-home" aria-hidden="true"></span>
            Home
        </a>

        <!-- AUTHENTICATED STATE -->
        <ng-container *ngIf="currentUser as user; else notLoggedIn">
            <div class="user-welcome-badge">
                <span class="welcome-label">HEY WELCOME</span>
                <span class="user-name">{{ user.name || 'Katie' }}</span>
            </div>
            
            <a *ngIf="user.role === 'admin' || user.role === 'survivor' || user.role === 'donor'" 
               [routerLink]="user.role === 'admin' ? '/admin' : (user.role === 'donor' ? '/donor-dashboard' : '/dashboard')" 
               class="nav-link dashboard-link">
                <span class="icon-dashboard" aria-hidden="true"></span>
                <span>{{ user.role === 'admin' ? 'Admin Portal' : 'Dashboard' }}</span>
            </a>
            
            <a (click)="logout()" class="logout-link" role="button" aria-label="Logout from account">
                <span class="icon-logout" aria-hidden="true"></span>
                <span>Logout</span>
            </a>
        </ng-container>

        <!-- PUBLIC STATE (Unauthenticated) -->
        <ng-template #notLoggedIn>
            <a routerLink="/donate" aria-label="Donate to JA Relief" class="donate-nav-btn">
                <span class="material-symbols-outlined text-base" aria-hidden="true">volunteer_activism</span>
                Donate
            </a>
            <a routerLink="/login" class="nav-login">
                <span class="icon-login" aria-hidden="true"></span>
                Login
            </a>
            <a routerLink="/login" class="admin-login-link">
                <span class="icon-admin" aria-hidden="true"></span>
                Admin Login
            </a>
        </ng-template>

        <!-- Global Accessibility Toggles (Directly in nav) -->
        <button (click)="toggleVoice()" class="theme-toggle-btn ml-auto" [class.active]="isListening">
            <span [class]="isListening ? 'icon-typing' : 'icon-voice'" aria-hidden="true"></span>
            <span class="btn-text">{{ isListening ? 'Typing' : 'Voice Typing' }}</span>
        </button>
        <button (click)="toggleDarkMode()" class="theme-toggle-btn">
            <span [class]="isDarkMode ? 'icon-light' : 'icon-dark'" aria-hidden="true"></span>
            <span class="btn-text">{{ isDarkMode ? 'Light Mode' : 'Dark Mode' }}</span>
        </button>
    </nav>
</header>
