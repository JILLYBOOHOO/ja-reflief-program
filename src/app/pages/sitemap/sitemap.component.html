<div class="sitemap-container">
    <h1>HTML Sitemap</h1>
    <p>Use the links below to navigate our disaster assistance platform.</p>

    <div class="sitemap-grid" role="list">
        <div *ngFor="let link of links" class="sitemap-item" role="listitem">
            <a [routerLink]="link.path" [attr.aria-label]="'Go to ' + link.name">
                <h3>{{ link.name }}</h3>
                <p>{{ link.description }}</p>
            </a>
        </div>
    </div>
</div>
